name: deploy

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - name: Install dependencies
        run: |
          pip install \
            mkdocs-material \
            mkdocs-macros-plugin \
            mkdocs-glightbox
      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force